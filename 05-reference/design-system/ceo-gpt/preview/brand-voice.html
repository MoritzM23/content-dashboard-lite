<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Brand voice</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Brand voice · 5 Achsen</div>
<div style="font:600 22px/1.15 var(--font-display); letter-spacing:-0.02em; color:var(--cream); margin-top:8px; margin-bottom:14px;">Der beste Mitarbeiter, den du je hattest.</div>
<div style="display:flex; flex-direction:column; gap:9px;">
  <div style="display:grid; grid-template-columns:1fr 130px 1fr; gap:14px; align-items:center;">
    <div style="font:500 12px/1 var(--font-body); color:var(--cream); text-align:right;">ruhig</div>
    <div style="position:relative; height:2px; background:rgba(110,55,38,0.55);"><div style="position:absolute; top:-3px; left:10px; width:8px; height:8px; background:#D48466; border-radius:999px;"></div></div>
    <div style="font:400 12px/1 var(--font-body); color:rgba(201,189,175,0.5);">nicht laut</div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 130px 1fr; gap:14px; align-items:center;">
    <div style="font:500 12px/1 var(--font-body); color:var(--cream); text-align:right;">premium</div>
    <div style="position:relative; height:2px; background:rgba(110,55,38,0.55);"><div style="position:absolute; top:-3px; left:14px; width:8px; height:8px; background:#D48466; border-radius:999px;"></div></div>
    <div style="font:400 12px/1 var(--font-body); color:rgba(201,189,175,0.5);">nicht plakativ</div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 130px 1fr; gap:14px; align-items:center;">
    <div style="font:500 12px/1 var(--font-body); color:var(--cream); text-align:right;">modern</div>
    <div style="position:relative; height:2px; background:rgba(110,55,38,0.55);"><div style="position:absolute; top:-3px; left:6px; width:8px; height:8px; background:#D48466; border-radius:999px;"></div></div>
    <div style="font:400 12px/1 var(--font-body); color:rgba(201,189,175,0.5);">nicht trendy</div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 130px 1fr; gap:14px; align-items:center;">
    <div style="font:500 12px/1 var(--font-body); color:var(--cream); text-align:right;">warm</div>
    <div style="position:relative; height:2px; background:rgba(110,55,38,0.55);"><div style="position:absolute; top:-3px; left:12px; width:8px; height:8px; background:#D48466; border-radius:999px;"></div></div>
    <div style="font:400 12px/1 var(--font-body); color:rgba(201,189,175,0.5);">nicht leger</div>
  </div>
  <div style="display:grid; grid-template-columns:1fr 130px 1fr; gap:14px; align-items:center;">
    <div style="font:500 12px/1 var(--font-body); color:var(--cream); text-align:right;">präzise</div>
    <div style="position:relative; height:2px; background:rgba(110,55,38,0.55);"><div style="position:absolute; top:-3px; left:8px; width:8px; height:8px; background:#D48466; border-radius:999px;"></div></div>
    <div style="font:400 12px/1 var(--font-body); color:rgba(201,189,175,0.5);">nicht pedantisch</div>
  </div>
</div>
</body></html>
