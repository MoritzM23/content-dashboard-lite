<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Imagery world</title>
<link rel="stylesheet" href="_card.css">
<style>
  .imgtile {
    aspect-ratio: 1/1;
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    background: #0A0805;
    box-shadow: inset 0 0 0 1px rgba(110,55,38,0.55);
  }
  .imgtile::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(70% 90% at 50% 110%, rgba(110,55,38,0.55) 0%, rgba(110,55,38,0) 60%);
    pointer-events: none;
  }
  .imgtile img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 8%;
  }
  .imgtile .label {
    position: absolute; left: 10px; top: 10px;
    font: 500 9px/1 var(--font-body);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--terra-glow);
  }
</style>
</head><body>
<div class="eyebrow">Imagery · Bronze-Serie</div>
<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:6px;">

  <div class="imgtile">
    <img src="../assets/imagery/brain.png" alt="Bronzenes Gehirn">
    <div class="label">Gehirn</div>
  </div>

  <div class="imgtile">
    <img src="../assets/imagery/voice.png" alt="Bronzenes Mikrofon">
    <div class="label">Stimme</div>
  </div>

  <div class="imgtile">
    <img src="../assets/imagery/hand.png" alt="Bronzene Hand">
    <div class="label">Hand</div>
  </div>

</div>
<div class="descriptor" style="margin-top:12px;">Drei bronzene Studio-Objekte als Bildsprache · <em>Gehirn</em> (Denken), <em>Stimme</em> (Sprechen), <em>Hand</em> (Tun). Warmes Licht, schwarzer Samt, freigestellt. Tonalität und Material sind damit final gesetzt.</div>
</body></html>
