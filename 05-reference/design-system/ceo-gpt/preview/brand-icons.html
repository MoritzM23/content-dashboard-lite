<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Icon sprite</title>
<link rel="stylesheet" href="_card.css">
<style>

  .icon-name { font:400 9px/1 var(--font-mono); color:var(--fg3); letter-spacing:0; }
</style>
</head><body>
<div class="eyebrow">Icons · 24 px · stroke 1.6</div>

<div class="descriptor" style="margin-top:12px;">Stroke only · butt caps · miter joins — gleicher Zeichenton wie die Wortmarke. Keine Filled-Varianten, keine Emoji.</div>
