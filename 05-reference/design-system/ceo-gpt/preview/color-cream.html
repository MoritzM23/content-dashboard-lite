<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Color · Cream foreground</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Color · Cream foreground</div>
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
  <div style="background:#F4EBDF; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#17130F;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.6;">Light Surface</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Paper</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#F4EBDF</div>
    </div>
  </div>
  <div style="background:#F2E8DC; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#17130F;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.6;">Fg · Primary</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Cream</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#F2E8DC</div>
    </div>
  </div>
  <div style="background:#C9BDAF; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#17130F;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.6;">Fg · Secondary</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Cream Muted</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#C9BDAF</div>
    </div>
  </div>
  <div style="background:#8C8479; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#0A0805;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Fg · Tertiary</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Cream Dim</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#8C8479</div>
    </div>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Reines Weiß ist verboten — es wirkt kalt gegen das warme Dunkel. Cream tut alles, was Weiß täte.</div>
</body></html>
