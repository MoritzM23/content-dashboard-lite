<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Signature radial glow</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Signature · radial atmosphere</div>
<div style="position:relative; height:200px; border-radius:18px; overflow:hidden; background:#17130F; margin-top:6px;">
  <div style="position:absolute; inset:0; background: radial-gradient(60% 80% at 50% 110%, rgba(110,55,38,0.55) 0%, transparent 65%); pointer-events:none;"></div>
  <div style="position:absolute; left:24px; bottom:18px; right:24px; display:flex; justify-content:space-between; align-items:flex-end; color:var(--cream);">
    <div>
      <div style="font:500 10px/1 var(--font-body); letter-spacing:0.32em; text-transform:uppercase; color:var(--terra-glow); margin-bottom:6px;">Glow</div>
      <div style="font:600 18px/1.1 var(--font-display); letter-spacing:-0.02em;">--glow-terra</div>
    </div>
    <div style="font:400 11px/1.4 var(--font-mono); color:var(--cream-muted); text-align:right;">radial-gradient(60% 80% at 50% 110%,<br>terra-deep 40% → transparent 65%)</div>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Bodennah anker­n, niemals zentriert. Die einzige atmosphärische Effekt, die die Marke verwendet.</div>
</body></html>
