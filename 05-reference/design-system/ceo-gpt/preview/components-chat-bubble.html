<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Chat message</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Chat · message bubbles</div>
<div style="display:flex; flex-direction:column; gap:14px; padding-top:6px;">
  <!-- assistant -->
  <div style="display:flex; gap:14px; align-items:flex-start;">
    <div style="flex:0 0 32px; width:32px; height:32px; border-radius:999px; background:linear-gradient(160deg,#C26B4C,#6E3726); color:var(--cream); display:flex; align-items:center; justify-content:center;">
      <svg viewBox="0 0 100 100" width="18" height="18" style="display:block;"><path d="M 78 32 A 30 30 0 1 0 78 68 L 56 68 L 56 58 L 70 58" fill="none" stroke="currentColor" stroke-width="12"/></svg>
    </div>
    <div style="flex:1;">
      <div style="font:500 11px/1 var(--font-body); color:var(--cream-muted); margin-bottom:6px; letter-spacing:0;">Friedrich · KI-Mitarbeiter <span style="opacity:0.5; margin-left:6px;">· 14:32</span></div>
      <div style="font:400 13px/1.55 var(--font-body); color:var(--cream);">Gerne. Ich habe die Q2-Zahlen mit den Wettbewerbern abgeglichen — drei Auffälligkeiten. Beginne ich mit der dringendsten?</div>
    </div>
  </div>
  <!-- user -->
  <div style="display:flex; gap:14px; align-items:flex-start; justify-content:flex-end;">
    <div style="background:#1B1612; padding:12px 16px; border-radius:14px 14px 4px 14px; max-width:80%;">
      <div style="font:400 13px/1.55 var(--font-body); color:var(--cream);">Ja, bitte. Und halte es kurz.</div>
    </div>
    <div style="flex:0 0 32px; width:32px; height:32px; border-radius:999px; background:#1B1612; border:1px solid rgba(110,55,38,0.5); display:flex; align-items:center; justify-content:center; font:600 11px/1 var(--font-display); color:var(--cream); letter-spacing:0;">FvS</div>
  </div>
</div>
</body></html>
