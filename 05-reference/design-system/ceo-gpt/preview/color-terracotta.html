<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Color · Terracotta accent</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Color · Terracotta accent</div>
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
  <div style="background:#3A1A11; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Ember</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Terra Ember</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#3A1A11</div>
    </div>
  </div>
  <div style="background:#6E3726; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Atmosphere</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Terra Deep</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#6E3726</div>
    </div>
  </div>
  <div style="background:#C26B4C; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#17130F;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Primary</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Terracotta</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#C26B4C</div>
    </div>
  </div>
  <div style="background:#D48466; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:#17130F;">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Highlight</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Terra Glow</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#D48466</div>
    </div>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Eine Akzent­farbe trägt die ganze Marke. Glow für Hover &amp; Labels, Deep für Atmosphäre &amp; Ränder.</div>
</body></html>
