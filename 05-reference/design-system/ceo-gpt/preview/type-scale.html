<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Type scale</div>
<div style="display:flex; flex-direction:column; gap:10px;">
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:700 56px/1 var(--font-display); letter-spacing:-0.05em; color:var(--cream);">Display</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Grotesk 700 · 86 / -0.05</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:700 38px/1 var(--font-display); letter-spacing:-0.035em; color:var(--cream);">Headline 1</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Grotesk 700 · 52 / -0.035</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:600 24px/1 var(--font-display); letter-spacing:-0.02em; color:var(--cream);">Headline 3</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Grotesk 600 · 30 / -0.02</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:400 16px/1.45 var(--font-body); color:var(--cream-muted);">Lead — Ein ruhiger, premium Ton.</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Inter 400 · 19 / 1.55</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:400 13px/1.5 var(--font-body); color:var(--cream-muted);">Body. Lauftext für UI und Marketing.</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Inter 400 · 15 / 1.6</div>
  </div>
  <div style="display:flex; align-items:baseline; gap:14px;">
    <div style="font:500 10px/1 var(--font-body); letter-spacing:0.32em; text-transform:uppercase; color:var(--terra-glow);">Eyebrow Label</div>
    <div style="font:400 10px/1 var(--font-body); color:var(--fg3); letter-spacing:0.1em; text-transform:uppercase;">Inter 500 · 11 · 0.32em</div>
  </div>
</div>
</body></html>
