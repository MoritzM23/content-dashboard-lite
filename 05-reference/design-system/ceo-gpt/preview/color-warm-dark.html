<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Color · Warm-dark stage</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Color · Warm-dark stage</div>
<div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
  <div style="background:#0A0805; border:1px solid #6E3726; border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Stage BG</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Dark Deep</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#0A0805</div>
    </div>
  </div>
  <div style="background:#17130F; border:1px solid rgba(110,55,38,0.5); border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Surface</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Dark</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#17130F</div>
    </div>
  </div>
  <div style="background:#1B1612; border:1px solid rgba(110,55,38,0.4); border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Raised tile</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Dark Raised</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#1B1612</div>
    </div>
  </div>
  <div style="background:#221C17; border:1px solid rgba(110,55,38,0.3); border-radius:12px; padding:14px; min-height:96px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase; opacity:0.7;">Hairline</div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Dark Edge</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#221C17</div>
    </div>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Vier eng beieinander liegende Warm-Dunkel­töne. Tiefe entsteht durch Glow, nicht durch Kontrast.</div>
</body></html>
