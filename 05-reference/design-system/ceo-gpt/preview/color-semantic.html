<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Color · Semantic states</title>
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="eyebrow">Color · Semantic states</div>
<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
  <div style="background:#7A8A4E; border-radius:12px; padding:14px; min-height:110px; display:flex; flex-direction:column; justify-content:space-between; color:#0A0805;">
    <div style="display:flex; align-items:center; gap:6px;"><div style="width:6px;height:6px;border-radius:999px;background:#0A0805;"></div><div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase;">Positive · Erfolg</div></div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Olive</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.8; margin-top:3px;">#7A8A4E</div>
    </div>
  </div>
  <div style="background:#D9A24E; border-radius:12px; padding:14px; min-height:110px; display:flex; flex-direction:column; justify-content:space-between; color:#0A0805;">
    <div style="display:flex; align-items:center; gap:6px;"><div style="width:6px;height:6px;border-radius:999px;background:#0A0805;"></div><div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase;">Warning · Hinweis</div></div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Amber</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.8; margin-top:3px;">#D9A24E</div>
    </div>
  </div>
  <div style="background:#B14A3A; border-radius:12px; padding:14px; min-height:110px; display:flex; flex-direction:column; justify-content:space-between; color:var(--cream);">
    <div style="display:flex; align-items:center; gap:6px;"><div style="width:6px;height:6px;border-radius:999px;background:var(--cream);"></div><div style="font:500 9px/1 var(--font-body); letter-spacing:0.2em; text-transform:uppercase;">Danger · Fehler</div></div>
    <div>
      <div style="font:600 13px/1 var(--font-display); letter-spacing:-0.01em;">Fired Clay</div>
      <div style="font:500 11px/1 var(--font-body); opacity:0.85; margin-top:3px;">#B14A3A</div>
    </div>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Warm-verschobene Status­farben. Keine Grün-Blau, kein Kobalt — alles bleibt in der Erdpalette.</div>
</body></html>
