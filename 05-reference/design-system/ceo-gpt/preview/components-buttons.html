<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .btn { font:500 13px/1 var(--font-body); padding:11px 18px; border-radius:10px; border:0; cursor:pointer; display:inline-flex; align-items:center; gap:8px; letter-spacing:-0.005em; transition:background 140ms var(--ease-out-soft), color 140ms var(--ease-out-soft); }
  .btn-primary { background:var(--terra); color:#0A0805; }
  .btn-primary:hover { background:var(--terra-glow); }
  .btn-secondary { background:transparent; color:var(--cream); border:1px solid rgba(110,55,38,0.55); }
  .btn-secondary:hover { background:rgba(244,235,223,0.04); }
  .btn-ghost { background:transparent; color:var(--cream-muted); }
  .btn-ghost:hover { color:var(--cream); }
  .btn-icon { width:34px; height:34px; padding:0; justify-content:center; }
  .btn-press { background:var(--terra); color:#0A0805; transform:scale(0.98); box-shadow:inset 0 1px 2px rgba(0,0,0,0.35); }
</style>
</head><body>
<div class="eyebrow">Buttons</div>
<div style="display:flex; flex-direction:column; gap:14px;">
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-primary">Mitarbeiter einstellen</button>
    <button class="btn btn-primary">Senden <span style="opacity:0.6;">↵</span></button>
    <button class="btn btn-press">Pressed</button>
  </div>
  <div style="display:flex; gap:10px; align-items:center;">
    <button class="btn btn-secondary">Abbrechen</button>
    <button class="btn btn-secondary">Datei anhängen</button>
    <button class="btn btn-ghost">Mehr ansehen</button>
    <button class="btn btn-secondary btn-icon"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 5v14M5 12h14"/></svg></button>
  </div>
  <div class="descriptor">Primary trägt Terracotta auf Dark-Deep-Text. Hover hebt zu Terra Glow. Press skaliert 0.98 mit Inset-Shadow.</div>
</div>
</body></html>
