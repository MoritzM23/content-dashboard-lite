<!doctype html>
<html lang="de"><head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field-label { font:500 11px/1 var(--font-body); color:var(--cream-muted); margin-bottom:6px; letter-spacing:0; }
  .input { width:100%; background:#1B1612; border:1px solid rgba(110,55,38,0.5); border-radius:10px; padding:11px 14px; font:400 13px/1.3 var(--font-body); color:var(--cream); outline:none; }
  .input:focus { outline:1px solid var(--terra-glow); outline-offset:2px; border-color:rgba(212,132,102,0.5); }
  .input::placeholder { color:var(--fg3); }
</style>
</head><body>
<div class="eyebrow">Form inputs</div>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
  <div>
    <div class="field-label">Name</div>
    <input class="input" value="Friedrich von Stein"/>
  </div>
  <div>
    <div class="field-label">Unternehmen</div>
    <input class="input" placeholder="z. B. Bayerische Vereinsbank"/>
  </div>
  <div style="grid-column: span 2;">
    <div class="field-label">Aufgabe für deinen KI-Mitarbeiter</div>
    <textarea class="input" rows="3" style="resize:none; font-family:var(--font-body);">Erstelle eine Wettbewerbsanalyse für unsere Q3-Strategieklausur. Tonalität: nüchtern, eine Seite, mit Quellen.</textarea>
  </div>
</div>
<div class="descriptor" style="margin-top:14px;">Focus-Ring ist 1 px Terra-Glow mit 2 px Offset. Kein Box-Shadow-Glow, kein blauer System-Outline.</div>
</body></html>
