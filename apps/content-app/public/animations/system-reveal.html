<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>System Reveal · 9:16 · 35s</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* CEO-GPT Brand-Tokens */
    --dark-deep:    #0A0805;
    --dark:         #17130F;
    --dark-raised:  #1B1612;
    --dark-edge:    #221C17;
    --cream:        #F2E8DC;
    --cream-muted:  #C9BDAF;
    --cream-dim:    #8C8479;
    --terra:        #C26B4C;
    --terra-glow:   #D48466;
    --terra-deep:   #6E3726;
    --terra-ember:  #3A1A11;

    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body:    'Inter', system-ui, sans-serif;

    /* Timing 35s total (synchron zur MP3, 35.6s)
       Phase 1: 0–9s   (0–25.7%)   · isolated tools
       Phase 2: 9–17s  (25.7–48.6%)· Jarvis enters
       Phase 3: 17–35s (48.6–100%) · lines + particles + pulse-halt
    */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw;
    height: 100vh;
    background: var(--dark-deep);
    color: var(--cream);
    font-family: var(--font-body);
    font-weight: 300;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .viewport {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .stage {
    width: 1080px;
    height: 1920px;
    position: relative;
    transform-origin: center center;
    flex-shrink: 0;
    overflow: hidden;
    background: var(--dark-deep);
  }

  /* Atmosphaere: warme Vignette + Grain */
  .stage::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 50%, rgba(212, 132, 102, 0.10) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.50) 0%, transparent 80%);
    pointer-events: none;
    z-index: 1;
  }
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: overlay;
  }

  /* ───────── EYEBROW (oben, wechselt pro Phase) ───────── */
  .eyebrow-stack {
    position: absolute;
    top: 130px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    height: 80px;
    padding: 0 60px;
  }
  .eyebrow {
    position: absolute;
    inset: 0;
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 38px;
    letter-spacing: 0.48em;
    text-transform: uppercase;
    color: var(--terra);
    text-shadow: 0 0 32px rgba(212, 132, 102, 0.35);
    opacity: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ───────── GLOW + JARVIS-SIGIL (zentral) ───────── */
  .jarvis-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 1300px;
    height: 1300px;
    transform: translate(-50%, -50%) scale(0.5);
    border-radius: 50%;
    background:
      radial-gradient(circle, rgba(212, 132, 102, 0.34) 0%, rgba(212, 132, 102, 0.10) 30%, transparent 70%);
    pointer-events: none;
    opacity: 0;
    z-index: 3;
    filter: blur(12px);
  }

  /* Sigil-Kreis — gross, aber nicht ueberladen */
  .jarvis {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 360px;
    height: 360px;
    transform: translate(-50%, -50%) scale(0.4);
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 38%, var(--terra-glow) 0%, var(--terra) 50%, var(--terra-deep) 100%);
    box-shadow:
      0 0 80px rgba(212, 132, 102, 0.55),
      0 0 200px rgba(212, 132, 102, 0.32),
      inset 0 -8px 32px rgba(0, 0, 0, 0.40),
      inset 0 6px 18px rgba(255, 220, 200, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    z-index: 6;
  }
  .jarvis::before {
    /* Aussen-Ring */
    content: "";
    position: absolute;
    inset: -24px;
    border-radius: 50%;
    border: 2px solid rgba(242, 232, 220, 0.22);
  }
  .jarvis-text {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 78px;
    letter-spacing: -0.02em;
    color: var(--cream);
    text-shadow:
      0 2px 14px rgba(0, 0, 0, 0.45),
      0 0 18px rgba(255, 220, 200, 0.25);
    line-height: 1;
    user-select: none;
  }

  /* ───────── LINIEN (SVG) + PARTIKEL ───────── */
  .lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }
  .line {
    stroke: var(--terra-glow);
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    filter: drop-shadow(0 0 10px rgba(212, 132, 102, 0.70));
    stroke-dasharray: 1400;
    stroke-dashoffset: 1400;
    opacity: 0;
  }
  .particle {
    fill: var(--cream);
    filter: drop-shadow(0 0 8px var(--terra-glow));
    opacity: 0;
  }

  /* ───────── TOOLS (7 Cards im Kreis, gross) ───────── */
  .tool {
    position: absolute;
    width: 240px;
    height: 240px;
    margin-left: -120px;
    margin-top: -120px;
    background: linear-gradient(180deg, var(--dark) 0%, var(--dark-raised) 100%);
    border: 1.5px solid rgba(110, 55, 38, 0.50);
    border-radius: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    box-shadow:
      0 26px 60px rgba(0, 0, 0, 0.60),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    opacity: 0.36;
    z-index: 5;
    will-change: transform, opacity;
  }
  .tool-logo {
    width: 100px;
    height: 100px;
    color: var(--terra-glow);
    filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.4));
  }
  .tool-logo svg { width: 100%; height: 100%; display: block; }
  .tool-name {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 26px;
    letter-spacing: 0.04em;
    color: var(--cream-muted);
    line-height: 1;
  }

  /* Tool-Positionen — Kreis um (540, 960), radius 420
       0°    (oben)       → (540, 540)
       51.4° (oben-rechts)→ (868, 698)
      102.9°(rechts-unten)→ (950, 1054)
      154.3°(unten-rechts)→ (722, 1338)
      205.7°(unten-links) → (358, 1338)
      257.1°(links-unten) → (130, 1054)
      308.6°(links-oben)  → (212, 698)
  */
  .tool[data-i="0"] { left: 540px; top: 540px; }
  .tool[data-i="1"] { left: 868px; top: 698px; }
  .tool[data-i="2"] { left: 950px; top: 1054px; }
  .tool[data-i="3"] { left: 722px; top: 1338px; }
  .tool[data-i="4"] { left: 358px; top: 1338px; }
  .tool[data-i="5"] { left: 130px; top: 1054px; }
  .tool[data-i="6"] { left: 212px; top: 698px; }

  /* ═══════════ ANIMATIONS — 35s ONE-SHOT ═══════════ */

  body[data-mode="play"] .eyebrow-1 { animation: eyebrow1 35s linear 1 forwards; }
  body[data-mode="play"] .eyebrow-2 { animation: eyebrow2 35s linear 1 forwards; }
  body[data-mode="play"] .eyebrow-3 { animation: eyebrow3 35s linear 1 forwards; }

  /* eyebrow1: 0–9s sichtbar → 0–25.7%
     eyebrow2: 9–17s         → 25.7–48.6%
     eyebrow3: 17–35s         → 48.6–100% */
  @keyframes eyebrow1 {
    0%    { opacity: 0; transform: translateY(12px); }
    2%    { opacity: 1; transform: translateY(0); }
    23%   { opacity: 1; transform: translateY(0); }
    26%   { opacity: 0; transform: translateY(-12px); }
    100%  { opacity: 0; }
  }
  @keyframes eyebrow2 {
    0%, 26%   { opacity: 0; transform: translateY(12px); }
    29%       { opacity: 1; transform: translateY(0); }
    46%       { opacity: 1; transform: translateY(0); }
    49%       { opacity: 0; transform: translateY(-12px); }
    100%      { opacity: 0; }
  }
  @keyframes eyebrow3 {
    0%, 49%   { opacity: 0; transform: translateY(12px); }
    52%       { opacity: 1; transform: translateY(0); }
    97%       { opacity: 1; transform: translateY(0); }
    100%      { opacity: 1; transform: translateY(0); }
  }

  /* Tools — float in Phase 1, settle in Phase 2, glow in Phase 3 */
  body[data-mode="play"] .tool { animation: toolJourney 35s ease-in-out 1 forwards; }
  body[data-mode="play"] .tool[data-i="0"] { animation-delay: 0.00s; }
  body[data-mode="play"] .tool[data-i="1"] { animation-delay: 0.20s; }
  body[data-mode="play"] .tool[data-i="2"] { animation-delay: 0.38s; }
  body[data-mode="play"] .tool[data-i="3"] { animation-delay: 0.55s; }
  body[data-mode="play"] .tool[data-i="4"] { animation-delay: 0.72s; }
  body[data-mode="play"] .tool[data-i="5"] { animation-delay: 0.90s; }
  body[data-mode="play"] .tool[data-i="6"] { animation-delay: 1.08s; }

  /* 25.7% = Phase1→2 · 48.6% = Phase2→3 */
  @keyframes toolJourney {
    0%    { opacity: 0.34; transform: scale(0.94) translate(0, 0); border-color: rgba(110, 55, 38, 0.38); }
    5%    { opacity: 0.44; transform: scale(0.95) translate(5px, -4px); }
    12%   { opacity: 0.28; transform: scale(0.94) translate(-4px, 5px); }
    19%   { opacity: 0.44; transform: scale(0.95) translate(6px, 3px); }
    25.7% { opacity: 0.38; transform: scale(0.95) translate(0, 0); border-color: rgba(110, 55, 38, 0.42); }
    /* settle */
    37%   { opacity: 0.70; transform: scale(0.98); border-color: rgba(212, 132, 102, 0.30); }
    48.6% { opacity: 0.95; transform: scale(1.00); border-color: rgba(212, 132, 102, 0.45); }
    /* full glow + halt */
    62%   { opacity: 1.00; transform: scale(1.00); border-color: rgba(212, 132, 102, 0.58); }
    100%  { opacity: 1.00; transform: scale(1.00); border-color: rgba(212, 132, 102, 0.58); }
  }
  body[data-mode="play"] .tool-logo { animation: toolLogoColor 35s ease-out 1 forwards; }
  body[data-mode="play"] .tool-name { animation: toolNameColor 35s ease-out 1 forwards; }
  @keyframes toolLogoColor {
    0%, 25.7% { color: rgba(212, 132, 102, 0.55); filter: drop-shadow(0 2px 10px rgba(0,0,0,0.4)); }
    48.6%     { color: var(--terra-glow); filter: drop-shadow(0 2px 14px rgba(212, 132, 102, 0.50)); }
    100%      { color: var(--terra-glow); filter: drop-shadow(0 2px 16px rgba(212, 132, 102, 0.62)); }
  }
  @keyframes toolNameColor {
    0%, 25.7% { color: var(--cream-dim); }
    48.6%     { color: var(--cream-muted); }
    100%      { color: var(--cream); }
  }

  /* Jarvis-Sigil — startet bei 25.7% (9s) */
  body[data-mode="play"] .jarvis      { animation: jarvisIn 35s ease-out 1 forwards, jarvisPulse 3.4s ease-in-out 12s infinite; }
  body[data-mode="play"] .jarvis-glow { animation: jarvisGlowIn 35s ease-out 1 forwards, jarvisGlowPulse 3.4s ease-in-out 12s infinite; }

  @keyframes jarvisIn {
    0%, 25.7% { opacity: 0; transform: translate(-50%, -50%) scale(0.4); }
    32%       { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
    37%       { opacity: 1; transform: translate(-50%, -50%) scale(1.00); }
    100%      { opacity: 1; transform: translate(-50%, -50%) scale(1.00); }
  }
  @keyframes jarvisPulse {
    0%, 100%  { box-shadow:
                 0 0 80px rgba(212, 132, 102, 0.55),
                 0 0 200px rgba(212, 132, 102, 0.32),
                 inset 0 -8px 32px rgba(0, 0, 0, 0.40),
                 inset 0 6px 18px rgba(255, 220, 200, 0.22); }
    50%       { box-shadow:
                 0 0 100px rgba(212, 132, 102, 0.72),
                 0 0 240px rgba(212, 132, 102, 0.42),
                 inset 0 -8px 32px rgba(0, 0, 0, 0.40),
                 inset 0 6px 22px rgba(255, 220, 200, 0.30); }
  }
  @keyframes jarvisGlowIn {
    0%, 25.7% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    34%       { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
    100%      { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
  }
  @keyframes jarvisGlowPulse {
    0%, 100%  { opacity: 1.0; transform: translate(-50%, -50%) scale(1.00); }
    50%       { opacity: 1.0; transform: translate(-50%, -50%) scale(1.06); }
  }

  /* Linien wachsen ab 48.6% (17s) — Stagger ~0.5s pro Linie, jede 1.2s wachsen
     Linie 0 49→52.4%, Linie 1 50.4→53.8%, ... Linie 6 57.4→60.8% */
  body[data-mode="play"] .line-0 { animation: line0 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-1 { animation: line1 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-2 { animation: line2 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-3 { animation: line3 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-4 { animation: line4 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-5 { animation: line5 35s ease-out 1 forwards; }
  body[data-mode="play"] .line-6 { animation: line6 35s ease-out 1 forwards; }

  @keyframes line0 {
    0%, 48.6% { stroke-dashoffset: 1400; opacity: 0; }
    50%       { opacity: 1; }
    52%       { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line1 {
    0%, 50%   { stroke-dashoffset: 1400; opacity: 0; }
    51.5%     { opacity: 1; }
    53.5%     { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line2 {
    0%, 51.5% { stroke-dashoffset: 1400; opacity: 0; }
    53%       { opacity: 1; }
    55%       { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line3 {
    0%, 53%   { stroke-dashoffset: 1400; opacity: 0; }
    54.5%     { opacity: 1; }
    56.5%     { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line4 {
    0%, 54.5% { stroke-dashoffset: 1400; opacity: 0; }
    56%       { opacity: 1; }
    58%       { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line5 {
    0%, 56%   { stroke-dashoffset: 1400; opacity: 0; }
    57.5%     { opacity: 1; }
    59.5%     { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }
  @keyframes line6 {
    0%, 57.5% { stroke-dashoffset: 1400; opacity: 0; }
    59%       { opacity: 1; }
    61%       { stroke-dashoffset: 0;    opacity: 1; }
    100%      { stroke-dashoffset: 0;    opacity: 1; }
  }

  body[data-mode="play"] .particle-anim {
    animation: particleFade 35s ease-out 1 forwards;
  }
  @keyframes particleFade {
    0%, 58%   { opacity: 0; }
    62%       { opacity: 0.95; }
    97%       { opacity: 0.95; }
    100%      { opacity: 0.85; }
  }

  /* Static-Mode (Hash #phase1/2/3) */
  body[data-mode="static"] * { animation: none !important; }
  body[data-mode="static"][data-phase="1"] .eyebrow-1 { opacity: 1; }
  body[data-mode="static"][data-phase="1"] .tool { opacity: 0.40; transform: scale(0.95); border-color: rgba(110, 55, 38, 0.42); }
  body[data-mode="static"][data-phase="1"] .tool-logo { color: rgba(212, 132, 102, 0.55); }
  body[data-mode="static"][data-phase="1"] .tool-name { color: var(--cream-dim); }

  body[data-mode="static"][data-phase="2"] .eyebrow-2 { opacity: 1; }
  body[data-mode="static"][data-phase="2"] .tool { opacity: 0.95; border-color: rgba(212, 132, 102, 0.45); }
  body[data-mode="static"][data-phase="2"] .tool-logo { color: var(--terra-glow); }
  body[data-mode="static"][data-phase="2"] .tool-name { color: var(--cream-muted); }
  body[data-mode="static"][data-phase="2"] .jarvis,
  body[data-mode="static"][data-phase="2"] .jarvis-glow { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  body[data-mode="static"][data-phase="3"] .eyebrow-3 { opacity: 1; }
  body[data-mode="static"][data-phase="3"] .tool { opacity: 1.0; border-color: rgba(212, 132, 102, 0.58); }
  body[data-mode="static"][data-phase="3"] .tool-logo { color: var(--terra-glow); }
  body[data-mode="static"][data-phase="3"] .tool-name { color: var(--cream); }
  body[data-mode="static"][data-phase="3"] .jarvis,
  body[data-mode="static"][data-phase="3"] .jarvis-glow { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  body[data-mode="static"][data-phase="3"] .line { opacity: 1; stroke-dashoffset: 0; }
  body[data-mode="static"][data-phase="3"] .particle { opacity: 0.95; }

  .hint {
    position: absolute;
    bottom: 24px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-body);
    font-size: 11px;
    color: rgba(242, 232, 220, 0.16);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    z-index: 7;
    pointer-events: none;
  }

  /* ───────── START-OVERLAY (armed-mode) ───────── */
  /* Vollflaechig klickbar. Chrome blockt audio.play() ohne User-Geste,
     daher MUSS der erste Klick die Animation + MP3 starten. */
  .start-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 50% 50%, rgba(10, 8, 5, 0.55) 0%, rgba(10, 8, 5, 0.90) 70%);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  body[data-mode="armed"] .start-overlay { display: flex; }

  .start-pulse {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, var(--terra-glow) 0%, var(--terra) 55%, var(--terra-deep) 100%);
    box-shadow:
      0 0 80px rgba(212, 132, 102, 0.55),
      0 0 200px rgba(212, 132, 102, 0.32),
      inset 0 -6px 24px rgba(0, 0, 0, 0.40),
      inset 0 4px 14px rgba(255, 220, 200, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: startPulse 1.6s ease-in-out infinite;
  }
  .start-pulse::before {
    content: "";
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 2px solid rgba(242, 232, 220, 0.22);
  }
  .start-label {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 38px;
    letter-spacing: 0.04em;
    color: var(--cream);
    text-shadow: 0 2px 14px rgba(0, 0, 0, 0.45);
    user-select: none;
  }
  @keyframes startPulse {
    0%, 100% { transform: scale(1.00); }
    50%      { transform: scale(1.06); }
  }
  .start-hint {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-body);
    font-size: 13px;
    color: rgba(242, 232, 220, 0.50);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body data-mode="armed">

<!-- Audio: spielt synchron zur Animation -->
<audio id="voice" src="system-reveal.mp3" preload="auto"></audio>

<!-- Start-Overlay: Chrome blockt audio.play() ohne User-Geste, deshalb erst armed.
     Klick startet Animation + MP3 gemeinsam. -->
<div class="start-overlay" id="startOverlay">
  <div class="start-pulse"><span class="start-label">Start</span></div>
  <div class="start-hint">Klick startet Animation und Stimme synchron</div>
</div>

<div class="viewport">
  <div class="stage">

    <!-- Eyebrow Stack -->
    <div class="eyebrow-stack">
      <div class="eyebrow eyebrow-1">Die meisten Menschen</div>
      <div class="eyebrow eyebrow-2">Ich bin anders</div>
      <div class="eyebrow eyebrow-3">Alles in einem Punkt</div>
    </div>

    <!-- Linien + Particle-Paths -->
    <svg class="lines" viewBox="0 0 1080 1920" preserveAspectRatio="none">
      <defs>
        <path id="pp0" d="M 540 960 L 540  540"  />
        <path id="pp1" d="M 540 960 L 868  698"  />
        <path id="pp2" d="M 540 960 L 950  1054" />
        <path id="pp3" d="M 540 960 L 722  1338" />
        <path id="pp4" d="M 540 960 L 358  1338" />
        <path id="pp5" d="M 540 960 L 130  1054" />
        <path id="pp6" d="M 540 960 L 212  698"  />
      </defs>

      <line class="line line-0" x1="540" y1="960" x2="540"  y2="540"  />
      <line class="line line-1" x1="540" y1="960" x2="868"  y2="698"  />
      <line class="line line-2" x1="540" y1="960" x2="950"  y2="1054" />

<script>
  // Viewport-Skalierung: 1080x1920 in den sichtbaren Bereich einpassen
  (function fitStage() {
    const stage = document.querySelector('.stage');
    function fit() {
      const sw = window.innerWidth;
      const sh = window.innerHeight;
      const scale = Math.min(sw / 1080, sh / 1920);
      stage.style.transform = `scale(${scale})`;
    }
    window.addEventListener('resize', fit);
    fit();
  })();

  const audio = document.getElementById('voice');
  const overlay = document.getElementById('startOverlay');

  // Hash-Phasen-Mode (statisch, kein Audio) — fuer Editor/Screenshot
  function applyHash() {
    const h = (location.hash || '').replace('#', '').toLowerCase();
    const map = { phase1: '1', phase2: '2', phase3: '3' };
    if (map[h]) {
      document.body.dataset.mode = 'static';
      document.body.dataset.phase = map[h];
      try { audio.pause(); audio.currentTime = 0; } catch (e) {}
    } else if (document.body.dataset.mode === 'static') {
      // Aus statischer Phase zurueck in armed (User muss neu starten)
      document.body.dataset.mode = 'armed';
      delete document.body.dataset.phase;
    }
  }
  window.addEventListener('hashchange', applyHash);

  function playAudioFromGesture() {
    // Wird nur aus einer User-Geste aufgerufen — kein Autoplay-Block.
    try {
      audio.currentTime = 0;
      const p = audio.play();
      if (p && typeof p.catch === 'function') {
        p.catch((err) => {
          console.warn('audio.play() rejected:', err);
        });
      }
    } catch (e) {
      console.warn('audio.play() throw:', e);
    }
  }

  function startPlay() {
    // Animation + MP3 gemeinsam ab jetzt. data-mode=play triggert ALLE
    // CSS-Animationen (forwards) gleichzeitig zum audio.play().
    document.body.dataset.mode = 'play';
    document.querySelectorAll('animateMotion').forEach(a => {
      try { a.beginElement(); } catch (e) {}
    });
    playAudioFromGesture();
  }

  function restartAll() {
    // Im armed-mode bleibt das Overlay sichtbar — Klick startet zum ersten Mal.
    if (document.body.dataset.mode === 'armed') {
      startPlay();
      return;
    }
    // Im play-mode: re-trigger Animation + MP3 neu von vorne.
    if (document.body.dataset.mode === 'play') {
      document.body.dataset.mode = 'paused';
      void document.body.offsetWidth;
      startPlay();
    }
  }
  // Klick auf Overlay ODER irgendwo auf der Seite → start/restart
  document.addEventListener('click', restartAll);

  // Komfort: 1/2/3 = statisch, 0/Esc = zurueck in armed
  document.addEventListener('keydown', (e) => {
    if (e.key === '1') location.hash = 'phase1';
    else if (e.key === '2') location.hash = 'phase2';
    else if (e.key === '3') location.hash = 'phase3';
    else if (e.key === '0' || e.key === 'Escape') location.hash = '';
    else if (e.key === ' ' || e.key === 'Enter') restartAll();
  });

  // Initial: Hash-Phase-Check, sonst bleibt body in armed (Overlay sichtbar).
  applyHash();
</script>
